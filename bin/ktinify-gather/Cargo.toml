[package]
name = "ktinify-gather"
version = "0.1.0"
edition = "2021"

# Build statically for deployment on target machines:
#   cargo build --release --target x86_64-unknown-linux-musl
# Adjust the target triple for the target architecture as needed.
# Install the musl toolchain with: rustup target add x86_64-unknown-linux-musl

[[bin]]
name = "ktinify-gather"
path = "src/main.rs"

[dependencies]
gather = { path = "../../crates/gather" }
